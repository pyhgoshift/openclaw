name = "ai-agent-ops"
main = "app/api/src/index.ts"
compatibility_date = "2024-09-23"

# 대상 도메인 연결 설정
routes = [
  { pattern = "pyhgoshift.com", custom_domain = true }
]

[[durable_objects.bindings]]
name = "SandboxContainer"
class_name = "SandboxContainer"

[[migrations]]
tag = "v1"
new_classes = ["SandboxContainer"]

[[r2_buckets]]
binding = "MASTER_STORAGE"
bucket_name = "pyhgoshift-master-skills"
