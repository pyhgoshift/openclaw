<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyhgoShift | 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00d9ff; --neon-green: #00ff41; --bg-black: #000000; }
        body { background: var(--bg-black); color: #ffffff; font-family: 'Noto Sans KR', sans-serif; }
        .monitor-panel { background: rgba(15, 15, 15, 0.95); border: 1px solid #222; }
        .status-val { font-weight: bold; font-family: 'Orbitron', sans-serif; }
        .header-font { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <header class="p-5 monitor-panel border-b border-zinc-800 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img src="logo-w1.png" class="h-10 w-auto object-contain" onerror="this.style.display='none'">
            <div>
                <h1 class="text-xl font-black header-font text-white">PYHGOSHIFT</h1>
                <p class="text-[9px] text-blue-400 font-bold tracking-widest">LIVE INFRA MONITORING</p>
            </div>
        </div>
        <div id="sys-clock" class="text-xs font-mono text-zinc-500"></div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-72 monitor-panel border-r border-zinc-800 p-4 space-y-2">
            <h2 class="text-[10px] font-black text-blue-500 mb-4 tracking-widest uppercase italic">Real-time Telemetry</h2>
            <div class="space-y-3 font-mono text-[11px]">
                <div class="flex justify-between border-b border-zinc-900 pb-1">
                    <span class="text-zinc-500">Worker Engine</span>
                    <span id="stat-worker" class="status-val text-zinc-600">CHECKING...</span>
                </div>
                <div class="flex justify-between border-b border-zinc-900 pb-1">
                    <span class="text-zinc-500">AI Neural Link</span>
                    <span id="stat-ai" class="status-val text-zinc-600">CHECKING...</span>
                </div>
                <div class="flex justify-between border-b border-zinc-900 pb-1">
                    <span class="text-zinc-500">Latency (RTT)</span>
                    <span id="stat-latency" class="status-val text-zinc-600">--ms</span>
                </div>
                <div class="flex justify-between border-b border-zinc-900 pb-1">
                    <span class="text-zinc-500">R2 Storage</span><span class="text-green-500 font-bold">STABLE</span>
                </div>
                <div class="flex justify-between border-b border-zinc-900 pb-1">
                    <span class="text-zinc-500">CORS Policy</span><span class="text-green-500 font-bold">ACTIVE</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-black">
            <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4 text-sm scroll-hide"></div>
            <div class="p-6 border-t border-zinc-800 bg-zinc-900/30">
                <div class="flex gap-3">
                    <input type="text" id="user-input" class="flex-1 bg-black border border-zinc-700 rounded p-3 text-white outline-none focus:border-blue-500" placeholder="명령 입력...">
                    <button id="send-btn" class="bg-white text-black px-6 py-2 rounded font-black header-font text-xs">SEND</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const workerUrl = 'https://moltbot-sandbox.pyhgoshift.workers.dev';
        
        // [정석] 실시간 모니터링 데이터 업데이트 함수
        async function updateMetrics() {
            const start = Date.now();
            try {
                const res = await fetch(`${workerUrl}/health`);
                const data = await res.json();
                const rtt = Date.now() - start;

                document.getElementById('stat-worker').innerText = data.worker;
                document.getElementById('stat-worker').className = 'status-val text-green-500';
                document.getElementById('stat-ai').innerText = data.nvidia;
                document.getElementById('stat-ai').className = data.nvidia === 'CONNECTED' ? 'status-val text-green-500' : 'status-val text-red-500';
                document.getElementById('stat-latency').innerText = `${rtt}ms`;
                document.getElementById('stat-latency').className = rtt < 200 ? 'status-val text-green-500' : 'status-val text-yellow-500';
            } catch (e) {
                document.getElementById('stat-worker').innerText = 'OFFLINE';
                document.getElementById('stat-worker').className = 'status-val text-red-500';
            }
        }

        // 5초마다 인프라 체크
        setInterval(updateMetrics, 5000);
        updateMetrics();

        // 시계 업데이트
        setInterval(() => {
            document.getElementById('sys-clock').innerText = new Date().toLocaleString();
        }, 1000);

        // 메시지 전송 로직 (기존과 동일하되 시각적 최적화)
        const chat = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');

        async function dispatch() {
            const val = input.value.trim();
            if(!val) return;
            appendMsg('COMMANDER', val, false);
            input.value = '';
            const aiBox = appendMsg('7 PARKS', 'analyzing...', true);

            try {
                const res = await fetch(`${workerUrl}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: val })
                });
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                aiBox.innerText = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    aiBox.innerText += decoder.decode(value, { stream: true });
                    chat.scrollTop = chat.scrollHeight;
                }
            } catch (e) { aiBox.innerText = "Error: " + e.message; }
        }

        function appendMsg(role, text, isAi) {
            const div = document.createElement('div');
            div.className = isAi ? 'text-blue-400' : 'text-zinc-100 font-bold';
            div.innerHTML = `<span class="text-[10px] opacity-50">[${role}]</span> ${text}`;
            chat.appendChild(div);
            return div;
        }

        btn.onclick = dispatch;
        input.onkeypress = (e) => { if(e.key==='Enter') dispatch(); };
    </script>
</body>
</html>
