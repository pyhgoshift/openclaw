<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyhgoShift | AgentOps Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Fira Code', monospace; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-blur: 10px; border: 1px solid #1a1a1a; }
        .neon-border { border: 1px solid #00ff41; box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
        .terminal-scroll::-webkit-scrollbar { width: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #333; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff41; animation: pulse 2s infinite; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <header class="p-4 glass border-b border-zinc-800 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="status-dot"></div>
            <h1 class="text-sm font-bold tracking-widest text-zinc-400">PYHGOSHIFT <span class="text-white">AGENT OPS</span></h1>
        </div>
        <div class="text-[10px] text-zinc-500">SYSTEM: v2.5.4 | SECURE_LINK: ACTIVE</div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-6 terminal-scroll bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-zinc-900/20 via-black to-black">
        <div class="text-[10px] text-zinc-600 mb-8 border-b border-zinc-900 pb-2">
            [SYS] INITIALIZING CORE ENGINE... DONE<br>
            [SYS] ESTABLISHING NEURAL LINK... READY<br>
            [SYS] 7 PARKS PROTOCOL LOADED.
        </div>
    </main>

    <footer class="p-6 glass border-t border-zinc-800">
        <div class="max-w-6xl mx-auto">
            <div class="relative flex items-center">
                <span class="absolute left-4 text-emerald-500 font-bold">>></span>
                <input type="text" id="user-input" 
                    class="w-full bg-black/50 border border-zinc-800 rounded-lg py-4 pl-12 pr-32 text-emerald-400 focus:outline-none focus:border-emerald-500 transition-all text-sm"
                    placeholder="명령을 하달하십시오 (Enter to dispatch)...">
                <button id="send-btn" 
                    class="absolute right-2 bg-emerald-600/10 hover:bg-emerald-600/20 text-emerald-500 border border-emerald-600/30 px-6 py-2 rounded-md text-xs font-bold transition-all uppercase tracking-tighter">
                    Dispatch
                </button>
            </div>
        </div>
    </footer>

    <script>
        const chat = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');

        function appendLog(role, text, isAi = false) {
            const container = document.createElement('div');
            container.className = isAi ? 'max-w-4xl' : 'max-w-4xl ml-auto text-right';
            
            const header = document.createElement('div');
            header.className = 'text-[10px] uppercase tracking-widest mb-1 text-zinc-600';
            header.innerText = `[${role}] ${new Date().toLocaleTimeString()}`;
            
            const msg = document.createElement('div');
            msg.className = isAi ? 'p-4 glass rounded-r-xl rounded-bl-xl border-l-2 border-emerald-500 text-zinc-300 text-sm leading-relaxed' 
                               : 'p-3 bg-zinc-900/50 rounded-l-xl rounded-tr-xl border-r-2 border-zinc-700 text-zinc-400 text-sm inline-block';
            msg.innerText = text;
            
            container.appendChild(header);
            container.appendChild(msg);
            chat.appendChild(container);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }

        async function dispatch() {
            const val = input.value.trim();
            if(!val) return;

            appendLog('Commander', val, false);
            input.value = '';
            
            const aiMsgBox = appendLog('7 Parks Engine', 'ACCESSING KNOWLEDGE BASE...', true);
            
            try {
                const res = await fetch('https://moltbot-sandbox.pyhgoshift.workers.dev/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: val })
                });

                if (!res.ok) throw new Error(`ERR_CODE: ${res.status}`);

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                aiMsgBox.innerText = ''; // 초기화

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    // 스트리밍 데이터 출력
                    aiMsgBox.innerText += chunk;
                    chat.scrollTop = chat.scrollHeight;
                }
            } catch (e) {
                aiMsgBox.className = 'p-4 glass rounded-xl border-l-2 border-red-500 text-red-400 text-xs';
                aiMsgBox.innerText = `CRITICAL_ERROR: ${e.message}\n> 브라우저 사이트 설정에서 '안전하지 않은 콘텐츠' 허용을 확인하십시오.`;
            }
        }

        btn.onclick = dispatch;
        input.onkeypress = (e) => { if(e.key === 'Enter') dispatch(); };
    </script>
</body>
</html>
