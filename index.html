<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyhgoShift | AgentOps Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; }
        .electric-blue { color: #007bff; }
        .msg-user { border-left: 3px solid #007bff; background: #1e1e1e; }
        .msg-ai { border-left: 3px solid #555; background: #161616; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-black">
        <h1 class="text-xl font-bold tracking-tighter">PYHGOSHIFT <span class="electric-blue">| AgentOps</span></h1>
        <div class="text-xs text-zinc-500 font-mono">v2.0 (The 7 Parks)</div>
    </header>
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm"></main>
    <footer class="p-4 bg-zinc-900 border-t border-zinc-800">
        <div class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="user-input" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-lg p-3 text-sm focus:outline-none" placeholder="@모드 명령 입력...">
            <button id="send-btn" class="bg-blue-600 px-6 py-2 rounded-lg font-bold">전송</button>
        </div>
    </footer>
    <script>
        const chatContainer = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        async function send() {
            const text = input.value.trim();
            if (!text) return;
            appendMsg('나', text, 'msg-user');
            input.value = '';
            try {
                const response = await fetch('https://moltbot-sandbox.pyhgoshift.workers.dev/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let aiMsg = appendMsg('에이전트', '', 'msg-ai');
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    chunk.split('\n').forEach(line => {
                        if (line.startsWith('data: {')) {
                            const json = JSON.parse(line.substring(6));
                            aiMsg.querySelector('.content').innerText += json.choices[0].delta.content || '';
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }
                    });
                }
            } catch (err) { appendMsg('System', '에러 발생', 'text-red-500'); }
        }
        function appendMsg(sender, content, style) {
            const div = document.createElement('div');
            div.className = `p-4 rounded ${style}`;
            div.innerHTML = `<div class="font-bold mb-1 text-xs opacity-50">${sender}</div><div class="content">${content}</div>`;
            chatContainer.appendChild(div);
            return div;
        }
        document.getElementById('send-btn').onclick = send;
        input.onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
