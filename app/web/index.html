<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyhgoShift | OS OpenClaw V5.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d9ff;
            --bg-black: #000000;
        }

        body {
            background: var(--bg-black);
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .monitor-panel {
            background: rgba(10, 10, 10, 0.98);
            border: 1px solid #222;
        }

        .header-font {
            font-family: 'Orbitron', sans-serif;
        }

        .expert-card {
            border-left: 3px solid #333;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.01);
        }

        .expert-active {
            border-left-color: var(--neon-blue);
            background: rgba(0, 217, 255, 0.1);
            box-shadow: inset 5px 0 10px rgba(0, 217, 255, 0.05);
        }

        .scroll-hide::-webkit-scrollbar {
            width: 4px;
        }

        .scroll-hide::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        @keyframes pulse-blue {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .thinking {
            animation: pulse-blue 1.5s infinite;
            color: var(--neon-blue);
            font-weight: bold;
            font-family: monospace;
        }
    </style>
</head>

<body class="h-screen flex flex-col">
    <header class="p-4 monitor-panel border-b border-zinc-800 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-4">
            <div class="h-10 w-10 bg-white flex items-center justify-center rounded-sm">
                <img src="https://raw.githubusercontent.com/freudpark/pyhgoshift/main/logo-w1.png" alt="PS"
                    onerror="this.parentElement.innerHTML='<span class=\'text-black font-black\'>PS</span>'">
            </div>
            <div>
                <h1 class="text-xl font-black header-font text-white leading-none tracking-tighter">PYHGOSHIFT</h1>
                <p class="text-[8px] text-blue-500 font-bold tracking-[0.2em] uppercase mt-1">Cognitive OS OpenClaw V5.3
                </p>
            </div>
        </div>
        <div id="sys-clock" class="text-[10px] font-mono text-zinc-600 uppercase"></div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-64 monitor-panel border-r border-zinc-800 p-4 flex flex-col">
            <div class="flex-1">
                <h2 class="text-[9px] font-black text-blue-500 mb-4 tracking-widest uppercase italic">Infrastructure
                </h2>
                <div class="space-y-3 font-mono text-[10px]">
                    <div class="flex justify-between border-b border-zinc-900 pb-1"><span>Worker</span><span
                            id="stat-worker" class="text-zinc-700 font-bold">--</span></div>
                    <div class="flex justify-between border-b border-zinc-900 pb-1"><span>AI Link</span><span
                            id="stat-ai" class="text-zinc-700 font-bold">--</span></div>
                </div>
            </div>
            <div class="border-t border-zinc-900 pt-6">
                <h2 class="text-[9px] font-black text-yellow-600 mb-3 tracking-widest uppercase">Cost Control</h2>
                <div class="space-y-3 font-mono text-[10px]">
                    <div class="flex justify-between border-b border-zinc-900 pb-1 text-zinc-500"><span>CF
                            Plan</span><span class="text-white">$5 FIXED</span></div>
                    <div class="flex justify-between border-b border-zinc-900 pb-1 text-zinc-500">
                        <span>Session</span><span id="stat-tokens" class="text-blue-400">0 tkn</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-black relative">
            <div id="chat-window" class="flex-1 overflow-y-auto p-8 space-y-6 text-sm scroll-hide"></div>
            <div class="p-6 monitor-panel border-t border-zinc-800">
                <div class="max-w-4xl mx-auto flex flex-col gap-4">
                    <div class="flex gap-2 overflow-x-auto pb-2 scroll-hide" id="model-selector">
                        <button onclick="setModel('moonshotai/kimi-k2.5')"
                            class="model-btn active px-3 py-1 border border-zinc-700 bg-zinc-900 text-[10px] font-bold rounded hover:border-blue-500 transition-all uppercase"
                            data-model="moonshotai/kimi-k2.5">Kimi-k2.5</button>
                        <button onclick="setModel('qwen/qwen3.5-397b-a17b')"
                            class="model-btn px-3 py-1 border border-zinc-700 bg-zinc-900 text-[10px] font-bold rounded hover:border-blue-500 transition-all uppercase"
                            data-model="qwen/qwen3.5-397b-a17b">Qwen-3.5</button>
                        <button onclick="setModel('deepseek-ai/deepseek-v3.2')"
                            class="model-btn px-3 py-1 border border-zinc-700 bg-zinc-900 text-[10px] font-bold rounded hover:border-blue-500 transition-all uppercase"
                            data-model="deepseek-ai/deepseek-v3.2">DeepSeek-V3.2</button>
                    </div>
                    <div class="flex gap-3">
                        <input type="text" id="user-input"
                            class="flex-1 bg-zinc-900/50 border border-zinc-800 rounded-lg p-4 text-white outline-none focus:border-blue-500 transition-all"
                            placeholder="명령을 입력하십시오...">
                        <button id="send-btn"
                            class="bg-white text-black px-10 py-4 rounded-lg font-black header-font text-xs hover:bg-blue-500 hover:text-white transition-all">DISPATCH</button>
                    </div>
                </div>
            </div>
        </main>

        <aside class="w-64 monitor-panel border-l border-zinc-800 p-4">
            <h2 class="text-[9px] font-black text-zinc-600 mb-4 tracking-widest uppercase">Specialist Pool</h2>
            <div id="expert-list" class="space-y-2"></div>
        </aside>
    </div>

    <style>
        .model-btn.active {
            border-color: #00d9ff;
            color: #00d9ff;
            background: rgba(0, 217, 255, 0.1);
        }

        .reasoning-block {
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid #555;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: #aaa;
            font-style: italic;
        }
    </style>

    <script>
        const endpoint = 'https://pyhgoshift.com';
        const experts = ['Blueprint', 'CodeGen', 'Reflector', 'Infiltrator', 'Guardian', 'Optimist', 'DataMiner'];
        let currentModel = 'moonshotai/kimi-k2.5';

        function initUI() {
            document.getElementById('expert-list').innerHTML = experts.map(n => `
                <div class="expert-card p-3 rounded-r opacity-20" id="exp-${n}">
                    <p class="text-[8px] font-bold text-blue-500">@${n}</p>
                    <p class="text-white font-bold uppercase tracking-tighter">${n} Ready</p>
                </div>
            `).join('');
        }

        function setModel(m) {
            currentModel = m;
            document.querySelectorAll('.model-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-model') === m) btn.classList.add('active');
            });
            console.log("Model switched to:", m);
        }

        async function checkHealth() {
            try {
                const res = await fetch(`${endpoint}/api/health`);
                const data = await res.text();
                if (data.includes('Active')) {
                    document.getElementById('stat-worker').innerText = 'ONLINE';
                    document.getElementById('stat-worker').className = 'text-green-500 font-bold';

                    const engineLabel = data.split('| Engine: ')[1]?.split('|')[0]?.trim() || 'NVIDIA NIM';
                    document.getElementById('stat-ai').innerText = engineLabel;
                    document.getElementById('stat-ai').className = 'text-blue-500 font-bold';

                    experts.forEach(n => document.getElementById(`exp-${n}`).classList.add('expert-active', 'opacity-100'));
                }
            } catch (e) {
                document.getElementById('stat-worker').innerText = 'OFFLINE';
                document.getElementById('stat-worker').className = 'text-red-500 font-bold';
            }
        }

        const chat = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');

        async function dispatch() {
            const val = input.value.trim();
            if (!val) return;
            appendMsg('COMMANDER', val, false);
            input.value = '';

            const aiBox = appendMsg('7 PARKS', '<span class="thinking"> 분석 중... 엔진(' + currentModel.split('/')[1] + ') 가동 중...</span>', true);

            try {
                const response = await fetch(`${endpoint}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: val, model: currentModel })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();
                renderResponse(aiBox, data.response);

            } catch (e) {
                aiBox.innerText = "연결 오류 발생. 엔진 상태를 확인하십시오.";
            }
        }

        function renderResponse(container, text) {
            container.innerHTML = '';
            if (text.includes('[THINKING]')) {
                const parts = text.split('[RESPONSE]');
                const thinking = parts[0].replace('[THINKING]', '').trim();
                const response = parts[1] || "";

                const tDiv = document.createElement('div');
                tDiv.className = 'reasoning-block';
                tDiv.innerText = thinking;
                container.appendChild(tDiv);

                const rDiv = document.createElement('div');
                rDiv.innerText = response.trim();
                container.appendChild(rDiv);
            } else {
                container.innerText = text;
            }
        }

        function appendMsg(role, text, isAi) {
            const div = document.createElement('div');
            div.className = isAi ? 'bg-zinc-900/40 p-6 border-l-2 border-blue-500 text-zinc-200' : 'text-right p-2 text-zinc-500 text-[10px]';
            div.innerHTML = `<span class="text-[8px] block opacity-40 uppercase mb-2 font-black tracking-widest">${role}</span><span>${text}</span>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div.querySelector('span:last-child');
        }

        initUI();
        setInterval(checkHealth, 10000);
        checkHealth();
        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleString(); }, 1000);
        btn.onclick = dispatch;
        input.onkeypress = (e) => { if (e.key === 'Enter') dispatch(); };
    </script>
</body>

</html>
